# Tiled 8x8 WS2812 Panel Configuration
# 64 panels arranged in 8x8 grid = 64x64 total LEDs

matrix:
  total_width: 64
  total_height: 64
  panel_width: 8
  panel_height: 8
  panels_x: 8          # Number of panels horizontally
  panels_y: 8          # Number of panels vertically

# Physical wiring configuration
wiring:
  # How panels are connected to each other
  panel_order: "serpentine"    # "serpentine" or "sequential"

  # Where the first panel's data input is located
  start_corner: "top_left"     # "top_left", "top_right", "bottom_left", "bottom_right"

  # LED order within each 8x8 panel
  panel_internal: "serpentine" # "serpentine" or "sequential"

  # Direction of the first row of panels
  first_row_direction: "right" # "right" or "left"

# Example serpentine wiring pattern (8x8 panels):
#
#  Panel layout (numbers = panel index):
#  ┌────┬────┬────┬────┬────┬────┬────┬────┐
#  │  0 │  1 │  2 │  3 │  4 │  5 │  6 │  7 │  → Row 0
#  ├────┼────┼────┼────┼────┼────┼────┼────┤
#  │ 15 │ 14 │ 13 │ 12 │ 11 │ 10 │  9 │  8 │  ← Row 1
#  ├────┼────┼────┼────┼────┼────┼────┼────┤
#  │ 16 │ 17 │ 18 │ 19 │ 20 │ 21 │ 22 │ 23 │  → Row 2
#  └────┴────┴────┴────┴────┴────┴────┴────┘
#  ... and so on
